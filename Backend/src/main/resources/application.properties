spring.application.name=food-rescue
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/foodrescue}

# Auto-create indexes defined via @GeoSpatialIndexed and @Indexed annotations
spring.data.mongodb.auto-index-creation=true

# Disable Spring Security's auto-generated user (we handle auth ourselves)
spring.security.user.name=disabled
spring.security.user.password=disabled

# Request size limits (prevent DoS via large payloads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.mvc.servlet.load-on-startup=1

# Logging — avoid verbose stack traces in production
logging.level.com.food.food_rescue=INFO
